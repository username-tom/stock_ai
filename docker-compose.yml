services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - IB_HOST=${IB_HOST:-host.docker.internal}
      - IB_PORT=${IB_PORT:-4002}
      - IB_CLIENT_ID=${IB_CLIENT_ID:-1}
      - TRADING_MODE=${TRADING_MODE:-paper}
      - DATABASE_URL=sqlite+aiosqlite:////app/data/stock_ai.db
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000,http://localhost:80
      - REPORTS_DIR=/app/reports_output
      - LOCAL_STORAGE_DIR=/app/local_storage
      # Required by SEC EDGAR fair-access policy; override with your own contact email.
      - SEC_CONTACT_EMAIL=tomwu3797@gmail.com
    volumes:
      - backend_data:/app/reports_output
      - backend_local_storage:/app/local_storage
      - db_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  backend_local_storage:
  db_data:
